<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>Succes Class - Teacher History</title>

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease forwards',
                        'slide-up': 'slideUp 0.3s ease forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e0f2fe 100%);
            min-height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .filter-chip.active {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>

<body class="antialiased text-gray-800">

    <div class="max-w-2xl mx-auto p-4 md:p-8 md:max-w-none md:w-full md:h-full">
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-6 mb-6">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <a href="teacher-agent.html" title="Back to Teacher Panel" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-200 transition-colors">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-gray-900">Class History</h1>
                        <p class="text-xs md:text-sm text-gray-500">
                            <span id="teacher-name-display">Teacher</span> 
                            <span id="room-code-display" class="font-mono">----</span>
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="exportHistory()" title="Export History" class="w-10 h-10 rounded-full bg-green-500 hover:bg-green-600 text-white flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-download"></i>
                    </button>
                    <button onclick="refreshHistory()" title="Refresh" class="w-10 h-10 rounded-full bg-blue-500 hover:bg-blue-600 text-white flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-rotate"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Search and Date Filter -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="search-input" placeholder="Search messages..."
                        class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        oninput="filterHistory()">
                </div>
                <div>
                    <input type="date" id="date-from" placeholder="From date"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        onchange="filterHistory()">
                </div>
                <div>
                    <input type="date" id="date-to" placeholder="To date"
                        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        onchange="filterHistory()">
                </div>
            </div>
        </div>

        <!-- Filter Chips -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="setFilter('all')" class="filter-chip active px-4 py-2 rounded-full text-sm font-semibold border border-gray-200 transition-all" data-filter="all">
                All
            </button>
            <button onclick="setFilter('broadcast')" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all" data-filter="broadcast">
                <i class="fa-solid fa-bullhorn mr-1 text-blue-500"></i> My Broadcasts
            </button>
            <button onclick="setFilter('question')" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all" data-filter="question">
                <i class="fa-solid fa-circle-question mr-1 text-purple-500"></i> Student Questions
            </button>
            <button onclick="setFilter('studentSpeech')" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all" data-filter="studentSpeech">
                <i class="fa-solid fa-microphone mr-1 text-green-500"></i> Student Speech
            </button>
            <button onclick="setFilter('chat')" class="filter-chip px-4 py-2 rounded-full text-sm font-semibold border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 transition-all" data-filter="chat">
                <i class="fa-solid fa-comment-dots mr-1 text-sky-500"></i> Student Chats
            </button>
        </div>

        <!-- Stats -->
        <div id="stats-section" class="hidden grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 text-center">
                <p class="text-xl font-bold text-blue-600" id="stat-broadcasts">0</p>
                <p class="text-[10px] text-gray-500 font-semibold uppercase">Broadcasts</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 text-center">
                <p class="text-xl font-bold text-purple-600" id="stat-questions">0</p>
                <p class="text-[10px] text-gray-500 font-semibold uppercase">Questions</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 text-center">
                <p class="text-xl font-bold text-green-600" id="stat-speech">0</p>
                <p class="text-[10px] text-gray-500 font-semibold uppercase">Speech</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-3 text-center">
                <p class="text-xl font-bold text-sky-600" id="stat-chats">0</p>
                <p class="text-[10px] text-gray-500 font-semibold uppercase">Chats</p>
            </div>
        </div>

        <!-- Student Participation Summary -->
        <div id="participation-summary" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">Student Participation</h3>
            <div id="student-stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                <!-- Will be populated -->
            </div>
        </div>

        <!-- History List -->
        <div id="history-container" class="space-y-3 custom-scrollbar">
            <!-- Will be populated -->
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="text-center py-20">
            <i class="fa-solid fa-circle-notch animate-spin text-4xl text-blue-500 mb-4"></i>
            <p class="text-gray-500 font-medium">Loading class history...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20">
            <i class="fa-solid fa-inbox text-5xl mb-4 text-gray-300"></i>
            <p class="text-gray-500 font-medium">No class activity yet</p>
            <p class="text-sm text-gray-400 mt-1">Start teaching to see history here!</p>
        </div>

        <!-- No Results State -->
        <div id="no-results-state" class="hidden text-center py-20">
            <i class="fa-solid fa-search text-5xl mb-4 text-gray-300"></i>
            <p class="text-gray-500 font-medium">No results match your filters</p>
        </div>

        <!-- Not Authenticated State -->
        <div id="not-authenticated-state" class="hidden text-center py-20">
            <i class="fa-solid fa-user-slash text-5xl mb-4 text-gray-300"></i>
            <p class="text-gray-500 font-medium">Teacher authentication required</p>
            <a href="teacher-agent.html" class="inline-block mt-4 px-6 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-semibold transition-colors">
                Go to Teacher Panel
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyC93B2GgE3HzaWl5gW_mRroobQybaZNFJs",
            authDomain: "macx-5feca.firebaseapp.com",
            databaseURL: "https://macx-5feca-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "macx-5feca",
            storageBucket: "macx-5feca.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890abcdef"
        };

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getDatabase(app);

        let allHistory = [];
        let currentFilter = 'all';
        let session = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Get teacher session from localStorage
            const saved = localStorage.getItem('teacher_session');
            if (!saved) {
                showNotAuthenticated();
                return;
            }

            try {
                session = JSON.parse(saved);
                if (!session.room || !session.name) {
                    showNotAuthenticated();
                    return;
                }

                // Update UI
                document.getElementById('teacher-name-display').textContent = session.name;
                document.getElementById('room-code-display').textContent = `Room: ${session.room}`;

                // Load history
                loadHistory();
            } catch (e) {
                showNotAuthenticated();
            }
        });

        function showNotAuthenticated() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('not-authenticated-state').classList.remove('hidden');
        }

        async function loadHistory() {
            const container = document.getElementById('history-container');
            const loading = document.getElementById('loading-state');
            const empty = document.getElementById('empty-state');
            const stats = document.getElementById('stats-section');
            const participation = document.getElementById('participation-summary');
            const noResults = document.getElementById('no-results-state');

            container.innerHTML = '';
            loading.classList.remove('hidden');
            empty.classList.add('hidden');
            stats.classList.add('hidden');
            participation.classList.add('hidden');
            noResults.classList.add('hidden');

            try {
                allHistory = [];
                const roomCode = session.room;

                // Fetch all data types
                const [messages, questions, responses, chats] = await Promise.all([
                    get(ref(db, `chats/${roomCode}/messages`)),
                    get(ref(db, `chats/${roomCode}/questions`)),
                    get(ref(db, `chats/${roomCode}/studentResponses`)),
                    get(ref(db, `chats/${roomCode}/studentChats`))
                ]);

                // Process messages (teacher broadcasts)
                if (messages.exists()) {
                    messages.forEach(snap => {
                        allHistory.push({
                            ...snap.val(),
                            type: 'broadcast',
                            id: snap.key,
                            ts: snap.val().timestamp || parseInt(snap.key) || Date.now()
                        });
                    });
                }

                // Process questions (all student questions)
                if (questions.exists()) {
                    questions.forEach(snap => {
                        allHistory.push({
                            ...snap.val(),
                            type: 'question',
                            id: snap.key,
                            ts: snap.val().timestamp || parseInt(snap.key) || Date.now()
                        });
                    });
                }

                // Process student responses (all student speech)
                if (responses.exists()) {
                    responses.forEach(snap => {
                        allHistory.push({
                            ...snap.val(),
                            type: 'studentSpeech',
                            id: snap.key,
                            ts: snap.val().timestamp || parseInt(snap.key) || Date.now()
                        });
                    });
                }

                // Process chats (all student chats)
                if (chats.exists()) {
                    chats.forEach(snap => {
                        allHistory.push({
                            ...snap.val(),
                            type: 'chat',
                            id: snap.key,
                            ts: snap.val().timestamp || parseInt(snap.key) || Date.now()
                        });
                    });
                }

                // Sort by timestamp (newest first)
                allHistory.sort((a, b) => b.ts - a.ts);

                loading.classList.add('hidden');

                if (allHistory.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                // Update stats
                updateStats();
                updateParticipationStats();
                stats.classList.remove('hidden');
                participation.classList.remove('hidden');

                // Render
                renderHistory();

            } catch (error) {
                console.error('Error loading history:', error);
                loading.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center py-10">
                        <i class="fa-solid fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
                        <p class="text-red-500 font-medium">Error loading history</p>
                        <p class="text-sm text-gray-400 mt-1">${error.message}</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const broadcasts = allHistory.filter(h => h.type === 'broadcast').length;
            const questions = allHistory.filter(h => h.type === 'question').length;
            const speech = allHistory.filter(h => h.type === 'studentSpeech').length;
            const chats = allHistory.filter(h => h.type === 'chat').length;

            document.getElementById('stat-broadcasts').textContent = broadcasts;
            document.getElementById('stat-questions').textContent = questions;
            document.getElementById('stat-speech').textContent = speech;
            document.getElementById('stat-chats').textContent = chats;
        }

        function updateParticipationStats() {
            const studentStats = {};
            
            allHistory.forEach(item => {
                if (item.senderName && item.type !== 'broadcast') {
                    const student = item.senderName;
                    if (!studentStats[student]) {
                        studentStats[student] = {
                            questions: 0,
                            speech: 0,
                            chats: 0,
                            total: 0
                        };
                    }
                    studentStats[student][item.type]++;
                    studentStats[student].total++;
                }
            });

            const container = document.getElementById('student-stats');
            container.innerHTML = Object.entries(studentStats)
                .sort(([,a], [,b]) => b.total - a.total)
                .slice(0, 6)
                .map(([student, stats]) => `
                    <div class="bg-gray-50 rounded-lg p-3">
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-medium text-gray-800 text-sm">${student}</span>
                            <span class="text-lg font-bold text-blue-600">${stats.total}</span>
                        </div>
                        <div class="flex gap-2 text-xs">
                            <span class="px-2 py-1 bg-purple-100 text-purple-700 rounded">${stats.questions} Q</span>
                            <span class="px-2 py-1 bg-green-100 text-green-700 rounded">${stats.speech} S</span>
                            <span class="px-2 py-1 bg-sky-100 text-sky-700 rounded">${stats.chats} C</span>
                        </div>
                    </div>
                `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            const noResults = document.getElementById('no-results-state');
            const empty = document.getElementById('empty-state');

            container.innerHTML = '';
            noResults.classList.add('hidden');
            empty.classList.add('hidden');

            let filtered = allHistory;

            // Apply type filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(h => h.type === currentFilter);
            }

            // Apply search
            if (searchQuery) {
                filtered = filtered.filter(h => {
                    const text = (h.text || h.textForTeacher || '').toLowerCase();
                    const sender = (h.senderName || '').toLowerCase();
                    return text.includes(searchQuery) || sender.includes(searchQuery);
                });
            }

            // Apply date filters
            if (dateFrom) {
                filtered = filtered.filter(h => new Date(h.ts) >= new Date(dateFrom));
            }
            if (dateTo) {
                filtered = filtered.filter(h => new Date(h.ts) <= new Date(dateTo + 'T23:59:59'));
            }

            if (filtered.length === 0) {
                if (searchQuery || currentFilter !== 'all' || dateFrom || dateTo) {
                    noResults.classList.remove('hidden');
                } else {
                    empty.classList.remove('hidden');
                }
                return;
            }

            filtered.forEach((item, index) => {
                const card = createHistoryCard(item, index);
                container.appendChild(card);
            });
        }

        function createHistoryCard(item, index) {
            const div = document.createElement('div');
            div.className = 'animate-slide-up';
            div.style.animationDelay = `${index * 0.03}s`;

            const typeConfig = {
                broadcast: {
                    icon: 'fa-bullhorn',
                    color: 'blue',
                    label: 'My Broadcast',
                    bgClass: 'bg-blue-50 border-blue-100'
                },
                question: {
                    icon: 'fa-circle-question',
                    color: 'purple',
                    label: 'Student Question',
                    bgClass: 'bg-purple-50 border-purple-100'
                },
                studentSpeech: {
                    icon: 'fa-microphone',
                    color: 'green',
                    label: 'Student Speech',
                    bgClass: 'bg-green-50 border-green-100'
                },
                chat: {
                    icon: 'fa-comment-dots',
                    color: 'sky',
                    label: 'Student Chat',
                    bgClass: 'bg-sky-50 border-sky-100'
                }
            };

            const config = typeConfig[item.type] || typeConfig.broadcast;
            const time = new Date(item.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const date = new Date(item.ts).toLocaleDateString([], { month: 'short', day: 'numeric' });

            div.innerHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow ${config.bgClass}">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full bg-${config.color}-100 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid ${config.icon} text-${config.color}-600"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between gap-2 mb-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-${config.color}-600 uppercase tracking-tight">${config.label}</span>
                                    ${item.senderName ? `<span class="text-xs text-gray-500">by ${item.senderName}</span>` : ''}
                                </div>
                                <span class="text-[10px] text-gray-400 font-medium">${date} ${time}</span>
                            </div>
                            <p class="text-sm text-gray-800 leading-relaxed">${item.text || item.textForTeacher || 'No content'}</p>
                            ${item.text && item.textForTeacher && item.text !== item.textForTeacher ? `
                                <p class="text-xs text-gray-400 mt-1 italic truncate">Original: ${item.text}</p>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;

            return div;
        }

        window.setFilter = function(filter) {
            currentFilter = filter;

            // Update chip styles
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active', 'bg-blue-500', 'text-white');
                chip.classList.add('bg-white', 'text-gray-600');
            });

            const activeChip = document.querySelector(`[data-filter="${filter}"]`);
            if (activeChip) {
                activeChip.classList.add('active');
                activeChip.classList.remove('bg-white', 'text-gray-600');
            }

            renderHistory();
        }

        window.filterHistory = function() {
            renderHistory();
        }

        window.refreshHistory = function() {
            if (session) {
                loadHistory();
            }
        }

        window.exportHistory = function() {
            if (!session || allHistory.length === 0) {
                alert('No data to export');
                return;
            }

            const exportData = {
                roomCode: session.room,
                teacherName: session.name,
                exported: new Date().toISOString(),
                stats: {
                    totalMessages: allHistory.length,
                    broadcasts: allHistory.filter(h => h.type === 'broadcast').length,
                    questions: allHistory.filter(h => h.type === 'question').length,
                    speech: allHistory.filter(h => h.type === 'studentSpeech').length,
                    chats: allHistory.filter(h => h.type === 'chat').length
                },
                messages: allHistory.map(item => ({
                    type: item.type,
                    sender: item.senderName,
                    text: item.text || item.textForTeacher,
                    originalText: item.text,
                    timestamp: item.ts,
                    date: new Date(item.ts).toISOString()
                }))
            };

            // Download as JSON
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `teacher-history-${session.room}-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>

</body>

</html>
